<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LSCSD — Панель (отладка)</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0a0c10; color: #e8e8e8; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #d4af37; margin-bottom: 30px; }
    .nav-brand { display: flex; align-items: center; gap: 12px; }
    .nav-logo { width: 40px; height: 40px; background: linear-gradient(145deg,#d4af37,#b8962a); clip-path: polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%); }
    .nav-title-main { font-size: 1.2rem; font-weight: 800; font-family: 'Orbitron'; background: linear-gradient(135deg,#d4af37,#f5e7a3); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .nav-user { display: flex; align-items: center; gap: 15px; background: rgba(30,35,45,0.9); padding: 5px 16px; border-radius: 40px; border: 1px solid rgba(212,175,55,0.3); }
    .nav-avatar { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #d4af37; }
    .back-btn { background: #d4af37; border: none; padding: 5px 12px; border-radius: 20px; cursor: pointer; color:#0f121a; font-weight: bold; }
    .auth-card { background: rgba(20,25,35,0.95); border: 1px solid #d4af37; border-radius: 30px; padding: 40px; text-align: center; max-width: 400px; margin: 100px auto; }
    .auth-btn { background: #5865F2; border: none; padding: 12px 24px; border-radius: 40px; color: white; cursor: pointer; }
    .main-container { padding: 20px; background: #0f121a; border-radius: 20px; margin-top: 20px; }
    .debug { background: #1a1f2a; padding: 15px; border-radius: 12px; margin-top: 20px; font-family: monospace; white-space: pre-wrap; }
  </style>
</head>
<body>

<div id="preloader" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0c10;display:flex;justify-content:center;align-items:center;z-index:10000;">
  <div style="color:#d4af37">Загрузка...</div>
</div>

<div id="app" style="display:none;">
  <div class="container">
    <div class="navbar">
      <div class="nav-brand">
        <div class="nav-logo"></div>
        <div><span class="nav-title-main">LSCSD PANEL (DEBUG)</span></div>
      </div>
      <div class="nav-user">
        <img id="navAvatar" class="nav-avatar" style="display:none;">
        <span id="navName"></span>
        <span id="userRoleBadge" style="background:#d4af37; color:#0f121a; padding:2px 8px; border-radius:20px;"></span>
        <button class="back-btn" id="backToMainBtn">На главную</button>
      </div>
    </div>

    <div id="authContainer">
      <div class="auth-card">
        <h2>Панель управления</h2>
        <button class="auth-btn" id="authBtn">Войти через Discord</button>
      </div>
    </div>

    <div id="mainContainer" style="display:none;">
      <div class="main-container">
        <h3>👥 Список сотрудников</h3>
        <div id="usersGrid" style="display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:15px; margin-top:20px;"></div>
        <div class="debug" id="debugLog"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const PROXY_URL = 'https://cs324022.tw1.ru/index.php';
  let currentUser = null;
  let currentUserRole = null;
  let allUsers = {};

  function showLog(msg) {
    const logDiv = document.getElementById('debugLog');
    if (logDiv) logDiv.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
    console.log(msg);
  }

  async function loadUserRole() {
    showLog('Загрузка роли пользователя...');
    const res = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'get_user_role', data: { userId: currentUser.id } })
    }).then(r => r.json());
    if (res.success) {
      currentUserRole = res.role;
      document.getElementById('userRoleBadge').innerText = currentUserRole.name || 'Младший состав';
      showLog(`Роль загружена: ${currentUserRole.name} (уровень ${currentUserRole.level})`);
    } else {
      showLog('Ошибка загрузки роли');
    }
  }

  async function loadAllUsers() {
    showLog('Загрузка всех пользователей...');
    const res = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'get_all_users_roles' })
    }).then(r => r.json());
    if (res.success) {
      allUsers = res.users;
      showLog(`Загружено пользователей: ${Object.keys(allUsers).length}`);
      renderUsers();
    } else {
      showLog('Ошибка загрузки списка пользователей');
    }
  }

  function renderUsers() {
    const container = document.getElementById('usersGrid');
    if (!container) return;
    const usersList = Object.keys(allUsers).map(id => ({ id, role: allUsers[id] }));
    container.innerHTML = '';
    if (usersList.length === 0) {
      container.innerHTML = '<div>Нет пользователей в базе</div>';
      return;
    }
    const roleLevels = {1:'Младший состав',2:'Dep.Head',3:'Head',4:'Curator',5:'Assist Sheriff',6:'SK/Dep.SK',7:'UnderSheriff',8:'Sheriff',9:'Разработчик'};
    for (const user of usersList) {
      const card = document.createElement('div');
      card.style.background = 'rgba(20,25,35,0.7)';
      card.style.borderRadius = '16px';
      card.style.padding = '15px';
      card.style.border = '1px solid rgba(212,175,55,0.3)';
      card.innerHTML = `
        <div style="display:flex; align-items:center; gap:12px;">
          <div style="width:40px;height:40px;background:#d4af37;border-radius:50%;display:flex;align-items:center;justify-content:center;">ID</div>
          <div><strong>${user.id}</strong><br>
            <span style="display:inline-block; background:#2c3e50; padding:2px 10px; border-radius:20px; font-size:12px;">${roleLevels[user.role.level] || 'Младший состав'}</span>
            ${user.role.department ? `<span style="margin-left:8px;color:#d4af37;">(${user.role.department})</span>` : ''}
          </div>
        </div>
      `;
      container.appendChild(card);
    }
  }

  function handleAuthCallback() {
    const hash = window.location.hash.substring(1);
    if (hash && hash.includes('access_token')) {
      const params = new URLSearchParams(hash);
      const token = params.get('access_token');
      if (token) {
        fetch('https://discord.com/api/users/@me', { headers: { Authorization: `Bearer ${token}` } })
          .then(r => r.json())
          .then(user => {
            localStorage.setItem('lscsd_user', JSON.stringify({ id: user.id, username: user.username, avatar: user.avatar ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png` : '' }));
            window.location.hash = '';
            location.reload();
          }).catch(err => showLog('Ошибка авторизации: ' + err));
      }
    }
  }

  async function checkAuth() {
    const user = localStorage.getItem('lscsd_user');
    if (user) {
      currentUser = JSON.parse(user);
      document.getElementById('authContainer').style.display = 'none';
      document.getElementById('mainContainer').style.display = 'block';
      document.getElementById('navName').innerText = currentUser.username;
      if (currentUser.avatar) document.getElementById('navAvatar').src = currentUser.avatar;
      document.getElementById('navAvatar').style.display = 'block';
      await loadUserRole();
      await loadAllUsers();
    } else {
      document.getElementById('authContainer').style.display = 'block';
      document.getElementById('mainContainer').style.display = 'none';
      handleAuthCallback();
    }
  }

  document.getElementById('authBtn').onclick = () => {
    const redirect = encodeURIComponent('https://style42124.github.io/lscsd/panel.html');
    window.location.href = `https://discord.com/api/oauth2/authorize?client_id=1494686473520287774&redirect_uri=${redirect}&response_type=token&scope=identify`;
  };
  document.getElementById('backToMainBtn').onclick = () => window.location.href = '/lscsd/';

  setTimeout(() => {
    document.getElementById('preloader').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  }, 500);

  checkAuth();
</script>
</body>
</html>
