<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>LSCSD — Панель управления</title>
  <link rel="icon" type="image/png" href="/lscsd/file.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .users-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:20px;margin-top:20px;}
    .user-card{background:rgba(20,25,35,0.7);border-radius:20px;padding:18px;border:1px solid rgba(212,175,55,0.3);transition:0.2s;position:relative;}
    .user-card:hover{border-color:#d4af37;}
    .user-actions{position:absolute;top:15px;right:15px;}
    .user-actions button{background:none;border:none;color:#d4af37;font-size:18px;cursor:pointer;}
    .user-actions button:hover{color:#f5e7a3;transform:scale(1.1);}
    .user-menu{display:none;position:absolute;top:40px;right:0;background:#1a1f2a;border-radius:15px;padding:10px;min-width:180px;z-index:100;border:1px solid #d4af37;}
    .user-menu button{width:100%;padding:8px;text-align:left;background:none;border:none;color:#e8e8e8;cursor:pointer;border-radius:8px;}
    .user-menu button:hover{background:rgba(212,175,55,0.2);}
    .role-select{width:100%;padding:8px;background:#0f121a;border:1px solid #d4af37;border-radius:12px;color:#e8e8e8;margin:5px 0;}
    .app-list{max-height:500px;overflow-y:auto;}
    .app-item{background:rgba(20,25,35,0.5);border-radius:12px;padding:12px;margin-bottom:10px;border-left:3px solid #d4af37;cursor:pointer;}
    .app-item:hover{background:rgba(212,175,55,0.1);}
    .app-status-pending{border-left-color:#ffa500;}
    .app-status-approved{border-left-color:#6bcf7f;}
    .app-status-rejected{border-left-color:#ff6b6b;}
    .filters{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
    .filter-btn{background:rgba(20,25,35,0.7);border:1px solid rgba(212,175,55,0.3);border-radius:20px;padding:8px 16px;cursor:pointer;color:#e8e8e8;}
    .filter-btn.active{background:#d4af37;color:#0f121a;}
    .search-box{width:100%;max-width:400px;margin:0 auto 20px;}
    .search-box input{width:100%;padding:10px 15px;background:#0f121a;border:1px solid rgba(212,175,55,0.3);border-radius:30px;color:#e8e8e8;}
    .user-role-tag{padding:4px 10px;border-radius:20px;font-size:12px;display:inline-block;margin-top:8px;}
    .role-1{background:#2c3e50;color:white;}
    .role-2,.role-3,.role-4,.role-5{background:#16a085;color:white;}
    .role-6{background:#8e44ad;color:white;}
    .role-7,.role-8,.role-9{background:#c0392b;color:white;}
    .badge-icon{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#d4af37,#b8962a);display:flex;align-items:center;justify-content:center;font-size:20px;color:#0f121a;}
    .main-container{flex:1;padding:30px;}
    .dashboard-header{text-align:center;margin-bottom:35px;}
    .dashboard-title{font-size:1.8rem;font-family:'Orbitron';color:#d4af37;}
    .tabs{display:flex;justify-content:center;gap:10px;margin-bottom:30px;}
    .tab-btn{background:rgba(20,25,35,0.7);border:1px solid rgba(212,175,55,0.3);border-radius:30px;padding:10px 25px;color:#e8e8e8;cursor:pointer;}
    .tab-btn.active{background:#d4af37;color:#0f121a;}
    .tab-content{display:none;}
    .tab-content.active{display:block;}
    .notification{position:fixed;top:90px;right:20px;min-width:300px;background:linear-gradient(135deg,#1a1f2a,#0f121a);border-left:4px solid #d4af37;border-radius:12px;padding:14px 20px;z-index:3000;animation:slideInRight 0.3s ease, fadeOut 0.3s ease 2.7s forwards;}
    @keyframes slideInRight{from{transform:translateX(400px);opacity:0;}to{transform:translateX(0);opacity:1;}}
    @keyframes fadeOut{to{opacity:0;visibility:hidden;}}
    .btn-primary{background:#d4af37;border:none;padding:8px 16px;border-radius:20px;cursor:pointer;color:#0f121a;font-weight:bold;}
    .back-btn{background:#d4af37;border:none;padding:6px 14px;border-radius:20px;cursor:pointer;color:#0f121a;font-weight:bold;margin-left:10px;}
  </style>
</head>
<body>

<div class="preloader" id="preloader">
  <div class="badge-container"><div class="badge-star"></div><div class="badge-inner"></div><div class="badge-text">LSCSD<br><span>PANEL ADMIN</span></div></div>
  <div class="preloader-logo">УПРАВЛЕНИЕ</div>
  <div class="preloader-text">Загрузка панели...</div>
  <div class="preloader-progress"><div class="preloader-progress-bar" id="preloaderProgress"></div></div>
</div>

<div class="app" id="app" style="display: none;">
  <nav class="navbar">
    <div class="nav-brand"><div class="nav-logo"></div><div><span class="nav-title-main">LSCSD PANEL</span><span class="nav-title-sub">УПРАВЛЕНИЕ ПЕРСОНАЛОМ</span></div></div>
    <div class="nav-user">
      <img id="navAvatar" class="nav-avatar"><span id="navName"></span>
      <span id="userRoleBadge" style="font-size:11px;background:#d4af37;color:#0f121a;padding:2px 8px;border-radius:20px;margin-left:8px;"></span>
      <button class="back-btn" id="backToMainBtn"><i class="fas fa-home"></i> На главную</button>
    </div>
  </nav>
  <div class="auth-container" id="authContainer"><div class="auth-card"><div class="auth-icon"><i class="fab fa-discord"></i></div><h1 class="auth-title">Панель управления</h1><p>Авторизуйтесь через Discord</p><button class="auth-btn" id="authBtn">Войти</button></div></div>
  <div class="main-container" id="mainContainer" style="display: none;">
    <div class="dashboard-header"><h1 class="dashboard-title"><i class="fas fa-users-cog"></i> Управление отделом</h1></div>
    <div class="tabs"><button class="tab-btn active" data-tab="users">👥 Сотрудники</button><button class="tab-btn" data-tab="applications">📋 Заявки</button></div>
    <div id="users-tab" class="tab-content active"><div class="search-box"><input type="text" id="userSearch" placeholder="🔍 Поиск..."></div><div class="users-grid" id="usersGrid"></div></div>
    <div id="applications-tab" class="tab-content"><div class="filters"><button class="filter-btn active" data-filter="all">Все</button><button class="filter-btn" data-filter="pending">На рассмотрении</button><button class="filter-btn" data-filter="approved">Одобренные</button><button class="filter-btn" data-filter="rejected">Отклоненные</button></div><div class="app-list" id="applicationsList"></div></div>
  </div>
</div>

<script src="js/panel.js"></script>
</body>
</html>
