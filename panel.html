<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>LSCSD — Панель управления</title>
  <link rel="icon" type="image/png" href="/lscsd/file.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:#0a0c10;color:#e8e8e8;}
    .navbar{background:rgba(13,17,23,0.95);backdrop-filter:blur(20px);border-bottom:1px solid #d4af37;padding:12px 35px;display:flex;justify-content:space-between;align-items:center;}
    .nav-brand{display:flex;align-items:center;gap:12px;cursor:pointer;}
    .nav-logo{width:40px;height:40px;background:linear-gradient(145deg,#d4af37,#b8962a);clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);}
    .nav-title-main{font-size:1.2rem;font-weight:800;font-family:'Orbitron';background:linear-gradient(135deg,#d4af37,#f5e7a3);-webkit-background-clip:text;background-clip:text;color:transparent;}
    .nav-title-sub{font-size:0.55rem;color:#6b6f78;}
    .nav-user{display:flex;align-items:center;gap:12px;background:rgba(30,35,45,0.9);padding:5px 16px;border-radius:40px;border:1px solid rgba(212,175,55,0.3);}
    .nav-avatar{width:30px;height:30px;border-radius:50%;border:2px solid #d4af37;}
    .back-btn{background:#d4af37;border:none;padding:6px 14px;border-radius:20px;cursor:pointer;color:#0f121a;font-weight:bold;margin-left:10px;}
    .auth-container{flex:1;display:flex;justify-content:center;align-items:center;padding:40px;}
    .auth-card{background:rgba(20,25,35,0.95);border:1px solid #d4af37;border-radius:35px;padding:40px;text-align:center;max-width:420px;width:100%;}
    .auth-icon{font-size:3.2rem;color:#5865F2;}
    .auth-title{font-size:1.6rem;font-family:'Orbitron';background:linear-gradient(135deg,#d4af37,#f5e7a3);-webkit-background-clip:text;background-clip:text;color:transparent;}
    .auth-btn{background:linear-gradient(135deg,#5865F2,#4752c4);border:none;padding:12px 28px;border-radius:40px;color:white;cursor:pointer;}
    .main-container{flex:1;padding:30px;}
    .dashboard-header{text-align:center;margin-bottom:35px;}
    .dashboard-title{font-size:1.8rem;font-family:'Orbitron';color:#d4af37;}
    .tabs{display:flex;justify-content:center;gap:10px;margin-bottom:30px;}
    .tab-btn{background:rgba(20,25,35,0.7);border:1px solid rgba(212,175,55,0.3);border-radius:30px;padding:10px 25px;cursor:pointer;color:#e8e8e8;}
    .tab-btn.active{background:#d4af37;color:#0f121a;}
    .tab-content{display:none;}
    .tab-content.active{display:block;}
    .search-box{width:100%;max-width:400px;margin:0 auto 20px;}
    .search-box input{width:100%;padding:10px 15px;background:#0f121a;border:1px solid rgba(212,175,55,0.3);border-radius:30px;color:#e8e8e8;}
    .users-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:20px;margin-top:20px;}
    .user-card{background:rgba(20,25,35,0.7);border-radius:20px;padding:18px;border:1px solid rgba(212,175,55,0.3);position:relative;}
    .user-card:hover{border-color:#d4af37;}
    .user-actions{position:absolute;top:15px;right:15px;}
    .user-actions button{background:none;border:none;color:#d4af37;font-size:18px;cursor:pointer;}
    .user-menu{display:none;position:absolute;top:40px;right:0;background:#1a1f2a;border-radius:15px;padding:10px;min-width:200px;z-index:100;border:1px solid #d4af37;}
    .user-menu button,.user-menu select{width:100%;margin:5px 0;padding:8px;text-align:left;background:#0f121a;border:1px solid #d4af37;border-radius:8px;color:#e8e8e8;cursor:pointer;}
    .user-menu button:hover{background:rgba(212,175,55,0.2);}
    .user-role-tag{padding:4px 10px;border-radius:20px;font-size:12px;display:inline-block;margin-top:8px;}
    .role-1{background:#2c3e50;}
    .role-2,.role-3,.role-4,.role-5{background:#16a085;}
    .role-6{background:#8e44ad;}
    .role-7,.role-8,.role-9{background:#c0392b;}
    .badge-icon{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#d4af37,#b8962a);display:flex;align-items:center;justify-content:center;font-size:20px;color:#0f121a;}
    .app-list{max-height:500px;overflow-y:auto;}
    .app-item{background:rgba(20,25,35,0.5);border-radius:12px;padding:12px;margin-bottom:10px;border-left:3px solid #d4af37;cursor:pointer;}
    .app-item:hover{background:rgba(212,175,55,0.1);}
    .app-status-pending{border-left-color:#ffa500;}
    .app-status-approved{border-left-color:#6bcf7f;}
    .app-status-rejected{border-left-color:#ff6b6b;}
    .filters{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
    .filter-btn{background:rgba(20,25,35,0.7);border:1px solid rgba(212,175,55,0.3);border-radius:20px;padding:8px 16px;cursor:pointer;color:#e8e8e8;}
    .filter-btn.active{background:#d4af37;color:#0f121a;}
    .notification{position:fixed;top:90px;right:20px;min-width:300px;background:linear-gradient(135deg,#1a1f2a,#0f121a);border-left:4px solid #d4af37;border-radius:12px;padding:14px 20px;z-index:3000;animation:slideIn 0.3s, fadeOut 0.3s 2.7s forwards;}
    @keyframes slideIn{from{transform:translateX(400px);opacity:0;}to{transform:translateX(0);opacity:1;}}
    @keyframes fadeOut{to{opacity:0;visibility:hidden;}}
    .btn-primary{background:#d4af37;border:none;padding:8px 16px;border-radius:20px;cursor:pointer;color:#0f121a;font-weight:bold;}
    .review-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:2000;display:flex;justify-content:center;align-items:center;}
    .review-content{background:linear-gradient(145deg,#1a1f2a,#0f121a);border-radius:20px;max-width:500px;width:90%;padding:25px;border:1px solid #d4af37;}
    .review-content select,.review-content textarea{width:100%;margin:10px 0;padding:10px;background:#0f121a;border:1px solid #d4af37;border-radius:12px;color:#e8e8e8;}
    .preloader{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0c10;z-index:10000;display:flex;justify-content:center;align-items:center;flex-direction:column;}
    .preloader-logo{font-size:1.8rem;font-family:'Orbitron';background:linear-gradient(135deg,#d4af37,#f5e7a3);-webkit-background-clip:text;background-clip:text;color:transparent;}
    .preloader-progress{width:240px;height:2px;background:rgba(212,175,55,0.2);border-radius:10px;margin-top:15px;overflow:hidden;}
    .preloader-progress-bar{width:0%;height:100%;background:linear-gradient(90deg,#d4af37,#f5e7a3);transition:width 0.1s;}
  </style>
</head>
<body>

<div class="preloader" id="preloader">
  <div class="preloader-logo">LSCSD PANEL</div>
  <div class="preloader-progress"><div class="preloader-progress-bar" id="preloaderProgress"></div></div>
</div>

<div class="app" id="app" style="display: none;">
  <nav class="navbar">
    <div class="nav-brand"><div class="nav-logo"></div><div><span class="nav-title-main">LSCSD PANEL</span><span class="nav-title-sub">УПРАВЛЕНИЕ ПЕРСОНАЛОМ</span></div></div>
    <div class="nav-user">
      <img id="navAvatar" class="nav-avatar"><span id="navName"></span>
      <span id="userRoleBadge" style="background:#d4af37;color:#0f121a;padding:2px 8px;border-radius:20px;margin-left:8px;font-size:12px;"></span>
      <button class="back-btn" id="backToMainBtn"><i class="fas fa-home"></i> На главную</button>
    </div>
  </nav>

  <div class="auth-container" id="authContainer">
    <div class="auth-card">
      <div class="auth-icon"><i class="fab fa-discord"></i></div>
      <h1 class="auth-title">Панель управления</h1>
      <button class="auth-btn" id="authBtn">Войти через Discord</button>
    </div>
  </div>

  <div class="main-container" id="mainContainer" style="display: none;">
    <div class="dashboard-header"><h1 class="dashboard-title">👥 Управление отделом</h1></div>
    <div class="tabs">
      <button class="tab-btn active" data-tab="users">Сотрудники</button>
      <button class="tab-btn" data-tab="applications">Заявки</button>
    </div>
    <div id="users-tab" class="tab-content active">
      <div class="search-box"><input type="text" id="userSearch" placeholder="Поиск по ID или имени..."></div>
      <div class="users-grid" id="usersGrid"></div>
    </div>
    <div id="applications-tab" class="tab-content">
      <div class="filters">
        <button class="filter-btn active" data-filter="all">Все</button>
        <button class="filter-btn" data-filter="pending">На рассмотрении</button>
        <button class="filter-btn" data-filter="approved">Одобренные</button>
        <button class="filter-btn" data-filter="rejected">Отклоненные</button>
      </div>
      <div class="app-list" id="applicationsList"></div>
    </div>
  </div>
</div>

<script src="js/panel.js"></script>
</body>
</html>
