<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>LSCSD — Панель управления</title>
  <link rel="icon" type="image/png" href="/lscsd/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .panel-container{max-width:1400px;margin:0 auto;padding:20px;}
    .users-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;margin-top:20px;}
    .user-card{background:rgba(20,25,35,0.7);border-radius:20px;padding:18px;border:1px solid rgba(212,175,55,0.3);transition:0.2s;}
    .user-card:hover{border-color:#d4af37;}
    .app-list{max-height:500px;overflow-y:auto;}
    .app-item{background:rgba(20,25,35,0.5);border-radius:12px;padding:12px;margin-bottom:10px;border-left:3px solid #d4af37;cursor:pointer;}
    .app-item:hover{background:rgba(212,175,55,0.1);}
    .app-status-pending{border-left-color:#ffa500;}
    .app-status-approved{border-left-color:#6bcf7f;}
    .app-status-rejected{border-left-color:#ff6b6b;}
    .review-modal{display:none;position:fixed;z-index:2000;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,0.95);justify-content:center;align-items:center;}
    .review-content{background:linear-gradient(145deg,#1a1f2a,#0f121a);border-radius:20px;max-width:500px;width:90%;padding:25px;border:1px solid #d4af37;}
    .role-select{width:100%;padding:10px;background:#0f121a;border:1px solid rgba(212,175,55,0.3);border-radius:12px;color:#e8e8e8;margin:10px 0;}
    .dept-select{width:100%;padding:10px;background:#0f121a;border:1px solid rgba(212,175,55,0.3);border-radius:12px;color:#e8e8e8;margin:10px 0;}
    .btn-primary{background:#d4af37;border:none;padding:10px 20px;border-radius:30px;cursor:pointer;margin:5px;color:#0f121a;font-weight:bold;}
    .btn-danger{background:#ff6b6b;border:none;padding:10px 20px;border-radius:30px;cursor:pointer;color:white;}
    .btn-success{background:#6bcf7f;border:none;padding:10px 20px;border-radius:30px;cursor:pointer;}
    .filters{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
    .filter-btn{background:rgba(20,25,35,0.7);border:1px solid rgba(212,175,55,0.3);border-radius:20px;padding:8px 16px;cursor:pointer;color:#e8e8e8;}
    .filter-btn.active{background:#d4af37;color:#0f121a;}
    .user-role-tag{padding:4px 10px;border-radius:20px;font-size:12px;display:inline-block;margin-top:8px;}
    .role-1{background:#2c3e50;color:white;}
    .role-2,.role-3,.role-4,.role-5{background:#16a085;color:white;}
    .role-6{background:#8e44ad;color:white;}
    .role-7,.role-8,.role-9{background:#c0392b;color:white;}
    .badge-icon{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#d4af37,#b8962a);display:flex;align-items:center;justify-content:center;font-size:20px;color:#0f121a;}
    .main-container{flex:1;padding:30px;}
    .dashboard-header{text-align:center;margin-bottom:35px;}
    .dashboard-title{font-size:1.8rem;font-family:'Orbitron';color:#d4af37;}
    .tabs{display:flex;justify-content:center;gap:10px;margin-bottom:30px;flex-wrap:wrap;}
    .tab-btn{background:rgba(20,25,35,0.7);border:1px solid rgba(212,175,55,0.3);border-radius:30px;padding:10px 25px;color:#e8e8e8;cursor:pointer;transition:0.2s;}
    .tab-btn.active{background:#d4af37;color:#0f121a;}
    .tab-btn:hover{transform:translateY(-2px);border-color:#d4af37;}
    .tab-content{display:none;}
    .tab-content.active{display:block;}
    .search-box{width:100%;max-width:400px;margin:0 auto 20px;}
    .search-box input{width:100%;padding:10px 15px;background:#0f121a;border:1px solid rgba(212,175,55,0.3);border-radius:30px;color:#e8e8e8;}
    .notification{position:fixed;top:90px;right:20px;min-width:300px;background:linear-gradient(135deg,#1a1f2a,#0f121a);border-left:4px solid #d4af37;border-radius:12px;padding:14px 20px;z-index:3000;animation:slideInRight 0.3s ease, fadeOut 0.3s ease 2.7s forwards;}
    .notification.success{border-left-color:#6bcf7f;}
    .notification.error{border-left-color:#ff6b6b;}
    .notification-title{font-weight:600;margin-bottom:5px;}
    .notification.success .notification-title{color:#6bcf7f;}
    .notification.error .notification-title{color:#ff6b6b;}
    @keyframes slideInRight{from{transform:translateX(400px);opacity:0;}to{transform:translateX(0);opacity:1;}}
    @keyframes fadeOut{to{opacity:0;visibility:hidden;}}
  </style>
</head>
<body>

<div class="preloader" id="preloader">
  <div class="badge-container">
    <div class="siren-glow"><div class="siren-glow-light"></div><div class="siren-glow-light"></div></div>
    <div class="badge-star"></div><div class="badge-inner"></div>
    <div class="badge-text">LSCSD<br><span>PANEL ADMIN</span></div>
  </div>
  <div class="preloader-logo">УПРАВЛЕНИЕ</div>
  <div class="preloader-text">Загрузка панели...</div>
  <div class="preloader-progress"><div class="preloader-progress-bar" id="preloaderProgress"></div></div>
</div>

<div class="app" id="app" style="display: none;">
  <nav class="navbar">
    <div class="nav-brand"><div class="nav-logo"></div><div><span class="nav-title-main">LSCSD PANEL</span><span class="nav-title-sub">УПРАВЛЕНИЕ ПЕРСОНАЛОМ</span></div></div>
    <div class="nav-user" id="navUser">
      <img id="navAvatar" class="nav-avatar"><span id="navName"></span>
      <span id="userRoleBadge" style="font-size:11px;background:#d4af37;color:#0f121a;padding:2px 8px;border-radius:20px;margin-left:8px;"></span>
    </div>
  </nav>

  <div class="auth-container" id="authContainer">
    <div class="auth-card">
      <div class="auth-icon"><i class="fab fa-discord"></i></div>
      <h1 class="auth-title">Панель управления</h1>
      <p style="color:#9ca3af;margin-bottom:25px;">Авторизуйтесь через Discord</p>
      <button class="auth-btn" id="authBtn"><i class="fab fa-discord"></i> Войти через Discord</button>
    </div>
  </div>

  <div class="main-container" id="mainContainer" style="display: none;">
    <div class="dashboard-header"><h1 class="dashboard-title"><i class="fas fa-users-cog"></i> Управление отделом</h1></div>
    
    <div class="tabs">
      <button class="tab-btn active" data-tab="users">👥 Сотрудники</button>
      <button class="tab-btn" data-tab="applications">📋 Заявки</button>
    </div>
    
    <div id="users-tab" class="tab-content active">
      <div class="search-box"><input type="text" id="userSearch" placeholder="🔍 Поиск по имени или ID..."></div>
      <div class="users-grid" id="usersGrid"></div>
    </div>
    
    <div id="applications-tab" class="tab-content">
      <div class="filters" id="appFilters">
        <button class="filter-btn active" data-filter="all">Все заявки</button>
        <button class="filter-btn" data-filter="pending">На рассмотрении</button>
        <button class="filter-btn" data-filter="approved">Одобренные</button>
        <button class="filter-btn" data-filter="rejected">Отклоненные</button>
      </div>
      <div class="app-list" id="applicationsList"></div>
    </div>
  </div>
</div>

<div class="review-modal" id="reviewModal">
  <div class="review-content">
    <h3 style="color:#d4af37;margin-bottom:15px;"><i class="fas fa-gavel"></i> Рассмотрение заявки</h3>
    <div id="reviewAppData"></div>
    <select id="reviewStatus" style="width:100%;padding:10px;margin:10px 0;background:#0f121a;border:1px solid #d4af37;border-radius:12px;color:#e8e8e8;">
      <option value="approved">✅ Одобрить</option>
      <option value="rejected">❌ Отклонить</option>
    </select>
    <textarea id="reviewComment" rows="3" placeholder="Комментарий..." style="width:100%;padding:10px;background:#0f121a;border:1px solid #d4af37;border-radius:12px;color:#e8e8e8;"></textarea>
    <div style="display:flex;gap:10px;margin-top:15px;">
      <button id="submitReviewBtn" class="btn-primary" style="flex:1;">Отправить решение</button>
      <button id="closeReviewBtn" class="btn-danger" style="flex:1;">Отмена</button>
    </div>
  </div>
</div>

<div class="role-modal" id="roleModal">
  <div class="review-content">
    <h3 style="color:#d4af37;"><i class="fas fa-user-tag"></i> Назначение роли</h3>
    <p id="roleTargetName" style="margin:10px 0;"></p>
    <select id="roleLevelSelect" class="role-select">
      <option value="1">Младший состав</option>
      <option value="2">Dep.Head (старший состав)</option>
      <option value="3">Head (старший состав)</option>
      <option value="4">Curator (старший состав)</option>
      <option value="5">Assist Sheriff</option>
      <option value="6">SK/Dep.SK</option>
      <option value="7">UnderSheriff</option>
      <option value="8">Sheriff</option>
      <option value="9">Разработчик</option>
    </select>
    <select id="roleDeptSelect" class="dept-select">
      <option value="">Без отдела</option>
      <option value="SAI">SAI</option>
      <option value="GU">GU</option>
      <option value="AF">AF</option>
      <option value="IAD">IAD</option>
      <option value="SEB">SEB</option>
      <option value="K9">K-9</option>
      <option value="DID">DID</option>
      <option value="MED">MED</option>
      <option value="SPD">SPD</option>
      <option value="HS">High Staff</option>
    </select>
    <div style="display:flex;gap:10px;margin-top:15px;">
      <button id="saveRoleBtn" class="btn-primary" style="flex:1;">Сохранить</button>
      <button id="closeRoleBtn" class="btn-danger" style="flex:1;">Отмена</button>
    </div>
  </div>
</div>

<script src="js/panel.js"></script>
</body>
</html>
