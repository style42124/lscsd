<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>LSCSD — Панель управления</title>
  <link rel="icon" type="image/png" href="/lscsd/file.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Подключаем ваш основной CSS -->
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Только специфичные для панели стили (дополняют основной CSS) */
    .users-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .user-card {
      background: rgba(20,25,35,0.7);
      border-radius: 24px;
      padding: 18px;
      border: 1px solid rgba(212,175,55,0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: 0.3s;
    }
    .user-card:hover {
      border-color: #d4af37;
      transform: translateY(-2px);
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .badge-icon {
      width: 45px;
      height: 45px;
      background: linear-gradient(145deg, #d4af37, #b8962a);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: #0f121a;
    }
    .user-role-tag {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      margin-top: 6px;
    }
    .role-1 { background: #2c3e50; }
    .role-2, .role-3, .role-4, .role-5 { background: #16a085; }
    .role-6 { background: #8e44ad; }
    .role-7, .role-8, .role-9 { background: #c0392b; }
    .app-list {
      max-height: 550px;
      overflow-y: auto;
    }
    .app-item {
      background: rgba(20,25,35,0.5);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      border-left: 4px solid #d4af37;
      cursor: pointer;
      transition: 0.2s;
    }
    .app-status-pending { border-left-color: #ffa500; }
    .app-status-approved { border-left-color: #6bcf7f; }
    .app-status-rejected { border-left-color: #ff6b6b; }
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(15px);
      z-index: 2000;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .modal-card {
      background: linear-gradient(145deg, #1a1f2a, #0f121a);
      border-radius: 30px;
      max-width: 500px;
      width: 90%;
      padding: 30px;
      border: 1px solid #d4af37;
    }
    .flex-buttons {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .btn-primary {
      background: #d4af37;
      border: none;
      padding: 8px 16px;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      color: #0f121a;
    }
    .btn-cancel {
      background: #ff6b6b;
      border: none;
      padding: 8px 16px;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      color: white;
    }
    .filters {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: rgba(20,25,35,0.7);
      border: 1px solid rgba(212,175,55,0.3);
      border-radius: 30px;
      padding: 8px 20px;
      cursor: pointer;
      color: #e8e8e8;
      transition: 0.2s;
    }
    .filter-btn.active {
      background: #d4af37;
      color: #0f121a;
    }
  </style>
</head>
<body>

<div class="preloader" id="preloader">
  <div class="preloader-logo">LSCSD PANEL</div>
  <div class="preloader-progress"><div class="preloader-progress-bar" id="preloaderProgress"></div></div>
</div>

<div class="app" id="app" style="display: none;">
  <nav class="navbar">
    <div class="nav-brand" id="navBrand">
      <div class="nav-logo"></div>
      <div>
        <span class="nav-title-main">LSCSD PANEL</span>
        <div class="nav-title-sub">УПРАВЛЕНИЕ ПЕРСОНАЛОМ</div>
      </div>
    </div>
    <div class="nav-user">
      <img id="navAvatar" class="nav-avatar">
      <span id="navName"></span>
      <span id="userRoleBadge" style="background:#d4af37; color:#0f121a; padding:2px 8px; border-radius:20px; font-size:12px;"></span>
      <button class="back-btn" id="backToMainBtn" style="background:#d4af37; border:none; padding:5px 12px; border-radius:20px; cursor:pointer; color:#0f121a; margin-left:10px;"><i class="fas fa-home"></i> На главную</button>
    </div>
  </nav>

  <div class="auth-container" id="authContainer">
    <div class="auth-card">
      <div class="auth-icon"><i class="fab fa-discord"></i></div>
      <h1 class="auth-title">Панель управления</h1>
      <button class="auth-btn" id="authBtn">Войти через Discord</button>
    </div>
  </div>

  <div class="main-container" id="mainContainer" style="display: none;">
    <div class="dashboard-header">
      <h1 class="dashboard-title"><i class="fas fa-users-cog"></i> Управление отделом</h1>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="users">👥 Сотрудники</button>
      <button class="tab-btn" data-tab="applications">📋 Заявки</button>
    </div>

    <div id="users-tab" class="tab-content active">
      <div class="search-box"><input type="text" id="userSearch" placeholder="🔍 Поиск по ID..."></div>
      <div class="users-grid" id="usersGrid"></div>
    </div>

    <div id="applications-tab" class="tab-content">
      <div class="filters">
        <button class="filter-btn active" data-filter="all">Все</button>
        <button class="filter-btn" data-filter="pending">На рассмотрении</button>
        <button class="filter-btn" data-filter="approved">Одобренные</button>
        <button class="filter-btn" data-filter="rejected">Отклоненные</button>
      </div>
      <div class="app-list" id="applicationsList"></div>
    </div>
  </div>
</div>

<script src="js/panel.js"></script>
</body>
</html>
