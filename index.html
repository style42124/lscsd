<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LSCSD</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:#0a0c10;min-height:100vh;}
    .navbar{background:rgba(13,17,23,0.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(212,175,55,0.2);padding:12px 35px;display:flex;justify-content:space-between;align-items:center;}
    .nav-logo{width:40px;height:40px;background:linear-gradient(145deg,#d4af37,#b8962a);clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);}
    .nav-title-main{font-size:1.2rem;font-weight:800;background:linear-gradient(135deg,#d4af37,#f5e7a3);-webkit-background-clip:text;background-clip:text;color:transparent;}
    .nav-user{display:flex;align-items:center;gap:12px;background:rgba(30,35,45,0.9);padding:5px 16px;border-radius:40px;border:1px solid rgba(212,175,55,0.3);}
    .nav-avatar{width:30px;height:30px;border-radius:50%;border:2px solid #d4af37;}
    .auth-container{flex:1;display:flex;justify-content:center;align-items:center;min-height:80vh;}
    .auth-card{background:rgba(20,25,35,0.95);border:1px solid rgba(212,175,55,0.3);border-radius:35px;padding:40px;text-align:center;max-width:420px;}
    .auth-icon{font-size:3rem;color:#5865F2;}
    .auth-title{font-size:1.5rem;background:linear-gradient(135deg,#d4af37,#f5e7a3);-webkit-background-clip:text;background-clip:text;color:transparent;}
    .auth-btn{background:linear-gradient(135deg,#5865F2,#4752c4);border:none;padding:12px 28px;border-radius:40px;color:white;cursor:pointer;}
    .main-container{padding:30px;}
    .dashboard-header{text-align:center;margin-bottom:30px;}
    .dashboard-title{font-size:1.6rem;color:#d4af37;}
    .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;max-width:1200px;margin:0 auto;}
    .card{background:linear-gradient(145deg,rgba(20,25,35,0.8),rgba(15,18,26,0.9));border:1px solid rgba(212,175,55,0.2);border-radius:22px;padding:22px;text-align:center;cursor:pointer;transition:0.3s;}
    .card:hover{transform:translateY(-8px);border-color:#d4af37;}
    .card-icon{font-size:2.5rem;}
    .card h3{color:#e8e8e8;margin-top:8px;font-size:1rem;}
    .modal{display:none;position:fixed;z-index:2000;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,0.95);justify-content:center;align-items:center;}
    .modal-content{background:linear-gradient(145deg,#1a1f2a,#0f121a);border-radius:24px;max-width:550px;width:90%;max-height:85vh;overflow-y:auto;border:1px solid #d4af37;padding:20px;}
    .modal-header{display:flex;justify-content:space-between;margin-bottom:15px;}
    .modal-header h2{color:#d4af37;}
    .modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:#9ca3af;}
    .form-group{margin-bottom:15px;}
    .form-group label{display:block;margin-bottom:5px;color:#d4af37;}
    .form-group input,.form-group select,.form-group textarea{width:100%;padding:10px;background:#0f121a;border:1px solid rgba(212,175,55,0.3);border-radius:20px;color:#e8e8e8;}
    .role-buttons{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
    .role-btn{background:#0f121a;border:1px solid rgba(212,175,55,0.3);padding:6px 14px;border-radius:20px;cursor:pointer;color:#e8e8e8;}
    .role-btn.selected{background:#d4af37;color:#0f121a;}
    .btn-submit{background:linear-gradient(135deg,#d4af37,#b8962a);border:none;padding:10px;border-radius:30px;font-weight:700;cursor:pointer;width:100%;margin-top:10px;}
    .notification{position:fixed;top:20px;right:20px;background:#1a1f2a;border-left:3px solid #d4af37;padding:10px 20px;border-radius:12px;z-index:9999;}
  </style>
</head>
<body>
  <div class="app" id="app" style="display: flex; flex-direction: column; min-height: 100vh;">
    <nav class="navbar">
      <div style="display:flex; align-items:center; gap:12px;">
        <div class="nav-logo"></div>
        <span class="nav-title-main">LSCSD</span>
      </div>
      <div class="nav-user" id="navUser" style="display: none;">
        <img id="navAvatar" class="nav-avatar">
        <span id="navName"></span>
      </div>
    </nav>

    <div id="authContainer" class="auth-container">
      <div class="auth-card">
        <div class="auth-icon"><i class="fab fa-discord"></i></div>
        <h1 class="auth-title">Добро пожаловать</h1>
        <p style="color:#9ca3af;margin:15px 0;">Авторизуйтесь через Discord</p>
        <button class="auth-btn" id="authBtn"><i class="fab fa-discord"></i> Войти через Discord</button>
      </div>
    </div>

    <div id="mainContainer" style="display: none;">
      <div class="dashboard-header">
        <h1 class="dashboard-title">📋 Электронные заявки</h1>
      </div>
      <div class="cards-grid" id="cardsGrid"></div>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle"></h2>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <script>
    // Простой тестовый скрипт
    console.log('Скрипт загружен');
    
    var authBtn = document.getElementById('authBtn');
    var authContainer = document.getElementById('authContainer');
    var mainContainer = document.getElementById('mainContainer');
    var navUser = document.getElementById('navUser');
    var cardsGrid = document.getElementById('cardsGrid');
    
    // Проверка авторизации
    var user = localStorage.getItem('lscsd_user');
    if (user) {
      var userData = JSON.parse(user);
      authContainer.style.display = 'none';
      mainContainer.style.display = 'block';
      navUser.style.display = 'flex';
      document.getElementById('navName').innerText = userData.username;
      if (userData.avatar) document.getElementById('navAvatar').src = userData.avatar;
      
      // Показываем карточки
      var forms = [
        {id:'department', label:'📋 Заявка в отдел', desc:'Подача заявления'},
        {id:'appeal', label:'⚖ Обжалование', desc:'Обжалование выговора'},
        {id:'workoff', label:'🛠 Отработка', desc:'Отработка выговора'}
      ];
      
      cardsGrid.innerHTML = '';
      forms.forEach(function(f) {
        var card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = '<div class="card-icon">' + f.label.split(' ')[0] + '</div><h3>' + f.label + '</h3><p>' + f.desc + '</p>';
        card.onclick = function() { alert('Форма ' + f.label + ' будет доступна позже'); };
        cardsGrid.appendChild(card);
      });
    } else {
      authBtn.onclick = function() {
        window.location.href = 'https://discord.com/api/oauth2/authorize?client_id=1494686473520287774&redirect_uri=' + encodeURIComponent('https://style42124.github.io/lscsd/index.html') + '&response_type=token&scope=identify';
      };
    }
    
    // Закрытие модалки
    document.getElementById('modalClose').onclick = function() {
      document.getElementById('modal').style.display = 'none';
    };
  </script>
</body>
</html>
