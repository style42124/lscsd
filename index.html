<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>LSCSD — Sheriff Department</title>
  <link rel="icon" type="image/png" href="/lscsd/file.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:#0a0c10;min-height:100vh;}
    .preloader{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0c10;z-index:10000;display:flex;justify-content:center;align-items:center;flex-direction:column;}
    .badge-container{position:relative;width:200px;height:200px;margin-bottom:30px;animation:badgeGlow 1.5s ease-in-out infinite;}
    .badge-star{position:absolute;width:200px;height:200px;background:linear-gradient(145deg,#d4af37,#b8962a);clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);animation:badgeSpin 2s ease-in-out infinite;}
    .badge-inner{position:absolute;top:25px;left:25px;width:150px;height:150px;background:linear-gradient(135deg,#1a1a2e,#0f121a);clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);}
    .badge-text{position:absolute;top:60px;left:50%;transform:translateX(-50%);font-family:'Orbitron',monospace;font-size:14px;font-weight:800;color:#d4af37;text-align:center;letter-spacing:2px;}
    .badge-text span{font-size:10px;display:block;margin-top:5px;}
    .siren-glow{position:absolute;top:-20px;left:50%;transform:translateX(-50%);display:flex;gap:15px;}
    .siren-glow-light{width:20px;height:20px;background:#ff0000;border-radius:50%;animation:sirenPulse 0.4s infinite;box-shadow:0 0 15px #ff0000;}
    .siren-glow-light:nth-child(2){background:#0066ff;animation-delay:0.2s;box-shadow:0 0 15px #0066ff;}
    @keyframes badgeGlow{0%,100%{filter:drop-shadow(0 0 5px #d4af37);}50%{filter:drop-shadow(0 0 25px #d4af37);}}
    @keyframes badgeSpin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
    @keyframes sirenPulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(1.3);}}
    .orbiting-particle{position:absolute;width:6px;height:6px;background:#d4af37;border-radius:50%;}
    .particle1{top:-30px;left:50%;animation:orbit1 2s linear infinite;}
    .particle2{top:50%;right:-30px;animation:orbit2 2s linear infinite;}
    .particle3{bottom:-30px;left:50%;animation:orbit3 2s linear infinite;}
    .particle4{top:50%;left:-30px;animation:orbit4 2s linear infinite;}
    @keyframes orbit1{0%{transform:translate(0,0);opacity:1;}50%{transform:translate(30px,30px);opacity:0.5;}100%{transform:translate(0,0);opacity:1;}}
    @keyframes orbit2{0%{transform:translate(0,0);opacity:1;}50%{transform:translate(-30px,30px);opacity:0.5;}100%{transform:translate(0,0);opacity:1;}}
    @keyframes orbit3{0%{transform:translate(0,0);opacity:1;}50%{transform:translate(-30px,-30px);opacity:0.5;}100%{transform:translate(0,0);opacity:1;}}
    @keyframes orbit4{0%{transform:translate(0,0);opacity:1;}50%{transform:translate(30px,-30px);opacity:0.5;}100%{transform:translate(0,0);opacity:1;}}
    .preloader-logo{font-size:1.8rem;font-weight:800;font-family:'Orbitron',monospace;letter-spacing:6px;background:linear-gradient(135deg,#d4af37,#f5e7a3);-webkit-background-clip:text;background-clip:text;color:transparent;margin-top:20px;opacity:0;animation:fadeInText 0.8s 1s forwards;}
    .preloader-text{color:#6b6f78;font-size:0.75rem;margin-top:10px;opacity:0;animation:fadeInText 0.8s 1.2s forwards;}
    .preloader-progress{width:240px;height:2px;background:rgba(212,175,55,0.2);border-radius:10px;margin-top:15px;overflow:hidden;opacity:0;animation:fadeInText 0.8s 1.4s forwards;}
    .preloader-progress-bar{width:0%;height:100%;background:linear-gradient(90deg,#d4af37,#f5e7a3);transition:width 0.1s linear;}
    @keyframes fadeInText{0%{opacity:0;transform:translateY(10px);}100%{opacity:1;transform:translateY(0);}}
    .navbar{background:rgba(13,17,23,0.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(212,175,55,0.2);padding:12px 35px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:15px;}
    .nav-brand{display:flex;align-items:center;gap:12px;cursor:pointer;}
    .nav-logo{width:40px;height:40px;background:linear-gradient(145deg,#d4af37,#b8962a);clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);}
    .nav-title-main{font-size:1.2rem;font-weight:800;font-family:'Orbitron';background:linear-gradient(135deg,#d4af37,#f5e7a3);-webkit-background-clip:text;background-clip:text;color:transparent;}
    .nav-title-sub{font-size:0.55rem;color:#6b6f78;display:block;}
    .nav-user{display:flex;align-items:center;gap:12px;background:rgba(30,35,45,0.9);padding:5px 16px;border-radius:40px;border:1px solid rgba(212,175,55,0.3);cursor:pointer;transition:0.2s;margin-left:auto;}
    .nav-user:hover{border-color:#d4af37;transform:scale(1.02);}
    .nav-avatar{width:30px;height:30px;border-radius:50%;border:2px solid #d4af37;}
    .nav-user span{color:#e8e8e8;font-weight:500;font-size:13px;}
    .settings-panel{position:fixed;top:80px;right:20px;width:320px;background:rgba(20,25,35,0.98);backdrop-filter:blur(20px);border-radius:20px;border:1px solid #d4af37;z-index:1000;padding:20px;transform:translateX(360px);transition:transform 0.3s;}
    .settings-panel.open{transform:translateX(0);}
    .settings-panel h3{color:#d4af37;margin-bottom:15px;display:flex;align-items:center;gap:8px;}
    .settings-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(212,175,55,0.2);}
    .settings-item label{color:#e8e8e8;display:flex;align-items:center;gap:8px;}
    .settings-item button{background:#ff6b6b;border:none;padding:6px 14px;border-radius:20px;color:white;cursor:pointer;transition:0.2s;}
    .settings-item button:hover{background:#ff4444;transform:scale(1.02);}
    .theme-switch{width:46px;height:22px;background:#333;border-radius:30px;position:relative;cursor:pointer;}
    .theme-switch.active{background:#d4af37;}
    .theme-switch::after{content:'';position:absolute;width:18px;height:18px;background:white;border-radius:50%;top:2px;left:3px;transition:0.2s;}
    .theme-switch.active::after{left:25px;}
    .close-settings{position:absolute;top:12px;right:15px;background:none;border:none;color:#9ca3af;font-size:18px;cursor:pointer;}
    .auth-container{flex:1;display:flex;justify-content:center;align-items:center;padding:40px;}
    .auth-card{background:rgba(20,25,35,0.95);backdrop-filter:blur(20px);border:1px solid rgba(212,175,55,0.3);border-radius:35px;padding:40px;text-align:center;max-width:420px;width:100%;transition:transform 0.3s;}
    .auth-card:hover{transform:translateY(-5px);}
    .auth-icon{font-size:3.2rem;color:#5865F2;}
    .auth-title{font-size:1.6rem;font-family:'Orbitron';background:linear-gradient(135deg,#d4af37,#f5e7a3);-webkit-background-clip:text;background-clip:text;color:transparent;margin:10px 0;}
    .auth-btn{background:linear-gradient(135deg,#5865F2,#4752c4);border:none;padding:12px 28px;border-radius:40px;color:white;cursor:pointer;font-weight:600;transition:0.2s;}
    .auth-btn:hover{transform:scale(1.03);box-shadow:0 5px 20px rgba(88,101,242,0.4);}
    .main-container{flex:1;padding:30px;}
    .dashboard-header{text-align:center;margin-bottom:35px;}
    .dashboard-title{font-size:1.8rem;font-family:'Orbitron';color:#d4af37;}
    .tabs{display:flex;justify-content:center;gap:10px;margin-bottom:30px;}
    .tab-btn{background:linear-gradient(135deg,rgba(20,25,35,0.7),rgba(15,18,26,0.8));border:1px solid rgba(212,175,55,0.3);border-radius:30px;padding:10px 25px;cursor:pointer;color:#e8e8e8;transition:0.2s;}
    .tab-btn.active{background:linear-gradient(135deg,#d4af37,#b8962a);color:#0f121a;}
    .tab-btn:hover{transform:translateY(-2px);border-color:#d4af37;}
    .tab-content{display:none;}
    .tab-content.active{display:block;}
    .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:22px;max-width:1200px;margin:0 auto;}
    .card{background:linear-gradient(145deg,rgba(20,25,35,0.8),rgba(15,18,26,0.9));backdrop-filter:blur(15px);border:1px solid rgba(212,175,55,0.2);border-radius:22px;padding:22px;text-align:center;cursor:pointer;transition:all 0.3s;}
    .card:hover{transform:translateY(-8px);border-color:#d4af37;box-shadow:0 10px 30px rgba(212,175,55,0.15);}
    .card-icon{font-size:2.8rem;transition:transform 0.3s;}
    .card:hover .card-icon{transform:scale(1.1);}
    .card h3{color:#e8e8e8;margin-top:8px;font-size:1rem;}
    .card p{color:#9ca3af;font-size:0.75rem;margin-top:4px;}
    .modal{display:none;position:fixed;z-index:2000;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,0.95);justify-content:center;align-items:center;}
    .modal-content{background:linear-gradient(145deg,#1a1f2a,#0a0e14,#0f121a);border-radius:24px;max-width:580px;width:90%;max-height:85vh;overflow-y:auto;border:1px solid #d4af37;position:relative;overflow:hidden;}
    .modal-content::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(212,175,55,0.08) 0%,transparent 70%);pointer-events:none;}
    .modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 22px;border-bottom:1px solid rgba(212,175,55,0.3);background:transparent;}
    .modal-header h2{color:#d4af37;font-family:'Orbitron';font-size:1.2rem;}
    .modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:#9ca3af;transition:0.2s;}
    .modal-close:hover{color:#ff6b6b;transform:scale(1.1);}
    .modal-body{padding:22px;background:transparent;}
    .form-group{margin-bottom:16px;}
    .form-group label{display:block;margin-bottom:6px;color:#d4af37;font-size:0.8rem;font-weight:500;}
    .form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 14px;background:linear-gradient(135deg,#0f121a,#0a0e14);border:1px solid rgba(212,175,55,0.3);border-radius:22px;color:#e8e8e8;font-size:0.85rem;transition:0.2s;}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#d4af37;box-shadow:0 0 8px rgba(212,175,55,0.2);}
    .role-buttons{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
    .role-btn{background:linear-gradient(135deg,#0f121a,#0a0e14);border:1px solid rgba(212,175,55,0.3);border-radius:22px;padding:6px 14px;cursor:pointer;transition:0.2s;font-size:0.8rem;color:#e8e8e8;}
    .role-btn.selected{background:linear-gradient(135deg,#d4af37,#b8962a);color:#0f121a;border-color:#fff;box-shadow:0 0 15px rgba(212,175,55,0.5);}
    .role-btn:hover{transform:scale(1.02);background:linear-gradient(135deg,#b8962a,#9a7a20);}
    .btn-submit{background:linear-gradient(135deg,#d4af37,#b8962a,#9a7a20);border:none;color:#0f121a;padding:10px;border-radius:30px;font-weight:700;cursor:pointer;width:100%;margin-top:10px;transition:0.2s;}
    .btn-submit:hover{transform:scale(1.01);box-shadow:0 3px 15px rgba(212,175,55,0.4);}
    .btn-submit:disabled{opacity:0.5;cursor:not-allowed;}
    .file-preview{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;}
    .file-preview-item{position:relative;width:80px;height:80px;border:1px solid #d4af37;border-radius:10px;overflow:hidden;cursor:pointer;background:linear-gradient(135deg,#0f121a,#0a0e14);}
    .file-preview-item img{width:100%;height:100%;object-fit:cover;}
    .remove-file{position:absolute;top:-8px;right:-8px;width:20px;height:20px;background:linear-gradient(135deg,#ff6b6b,#ff4444);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;color:white;}
    .history-list{max-height:400px;overflow-y:auto;}
    .history-item{background:rgba(20,25,35,0.5);border-radius:12px;padding:12px;margin-bottom:8px;border-left:3px solid #d4af37;}
    .history-item .time{font-size:0.7rem;color:#6b6f78;}
    .history-item .type{font-weight:600;color:#d4af37;}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:15px;margin-bottom:20px;}
    .stat-card{background:rgba(20,25,35,0.5);border-radius:16px;padding:15px;text-align:center;}
    .stat-number{font-size:2rem;font-weight:800;color:#d4af37;}
    .stat-label{color:#9ca3af;font-size:0.8rem;margin-top:5px;}
    canvas{max-height:300px;margin-top:20px;}
    .search-box{width:100%;max-width:400px;margin:0 auto 20px;}
    .search-box input{width:100%;padding:10px 15px;background:linear-gradient(135deg,#0f121a,#0a0e14);border:1px solid rgba(212,175,55,0.3);border-radius:30px;color:#e8e8e8;}
    .notification{position:fixed;top:20px;right:20px;background:linear-gradient(135deg,#1a1f2a,#0f121a);border-left:4px solid #d4af37;border-radius:12px;padding:12px 20px;min-width:260px;z-index:9999;animation:slideInRight 0.3s, fadeOut 0.3s 2.7s forwards;box-shadow:0 5px 25px rgba(0,0,0,0.3);}
    @keyframes slideInRight{from{transform:translateX(400px);opacity:0;}to{transform:translateX(0);opacity:1;}}
    @keyframes fadeOut{to{opacity:0;visibility:hidden;}}
    .bug-modal{display:none;position:fixed;z-index:2001;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,0.9);justify-content:center;align-items:center;}
    .bug-content{background:linear-gradient(145deg,#1a1f2a,#0f121a);border-radius:20px;max-width:450px;width:90%;padding:25px;border:1px solid #d4af37;}
    .bug-content select,.bug-content textarea{width:100%;padding:10px;margin:10px 0;background:linear-gradient(135deg,#0f121a,#0a0e14);border:1px solid rgba(212,175,55,0.3);border-radius:15px;color:#e8e8e8;}
    @media(max-width:768px){.navbar{padding:10px 20px;}.main-container{padding:20px;}.cards-grid{grid-template-columns:1fr;}.settings-panel{width:280px;right:10px;}.dashboard-title{font-size:1.4rem;}}
  </style>
</head>
<body>

<div class="preloader" id="preloader">
  <div class="badge-container">
    <div class="siren-glow"><div class="siren-glow-light"></div><div class="siren-glow-light"></div></div>
    <div class="badge-star"></div><div class="badge-inner"></div>
    <div class="badge-text">LSCSD<br><span>SHERIFF DEPARTMENT</span></div>
    <div class="orbiting-particle particle1"></div><div class="orbiting-particle particle2"></div>
    <div class="orbiting-particle particle3"></div><div class="orbiting-particle particle4"></div>
  </div>
  <div class="preloader-logo">LSCSD</div>
  <div class="preloader-text">Верификация полномочий...</div>
  <div class="preloader-progress"><div class="preloader-progress-bar" id="preloaderProgress"></div></div>
</div>

<div class="app" id="app" style="display: none;">
  <nav class="navbar">
    <div class="nav-brand"><div class="nav-logo"></div><div><span class="nav-title-main">LSCSD</span><span class="nav-title-sub">LOS SANTOS COUNTY SHERIFF'S DEPARTMENT</span></div></div>
    <div class="nav-user" id="navUser" style="display: none;">
      <img id="navAvatar" class="nav-avatar"><span id="navName"></span>
      <i class="fas fa-cog" style="color:#d4af37;font-size:1rem; margin-left:8px; cursor:pointer;"></i>
    </div>
  </nav>

  <div class="auth-container" id="authContainer">
    <div class="auth-card">
      <div class="auth-icon"><i class="fab fa-discord"></i></div>
      <h1 class="auth-title">Добро пожаловать</h1>
      <p style="color:#9ca3af;margin-bottom:25px;">Авторизуйтесь через Discord</p>
      <button class="auth-btn" id="authBtn"><i class="fab fa-discord"></i> Войти через Discord</button>
    </div>
  </div>

  <div class="main-container" id="mainContainer" style="display: none;">
    <div class="dashboard-header">
      <h1 class="dashboard-title"><i class="fas fa-file-alt"></i> Электронные заявки</h1>
      <p style="color:#9ca3af;margin-top:8px;">Выберите тип обращения</p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="applications">📋 Заявки</button>
      <button class="tab-btn" data-tab="history">📜 История</button>
      <button class="tab-btn" data-tab="stats">📊 Статистика</button>
    </div>

    <div id="applications-tab" class="tab-content active"><div class="cards-grid" id="cardsGrid"></div></div>
    <div id="history-tab" class="tab-content">
      <div class="search-box"><input type="text" id="historySearch" placeholder="🔍 Поиск по заявкам..."></div>
      <div class="history-list" id="historyList"></div>
    </div>
    <div id="stats-tab" class="tab-content">
      <div class="stats-grid" id="statsGrid"></div>
      <canvas id="statsChart" width="400" height="200"></canvas>
    </div>
  </div>
</div>

<div class="settings-panel" id="settingsPanel">
  <button class="close-settings" id="closeSettings">&times;</button>
  <h3><i class="fas fa-sliders-h"></i> Настройки</h3>
  <div class="settings-item"><label><i class="fas fa-moon"></i> Тёмная / <i class="fas fa-sun"></i> Светлая тема</label><div class="theme-switch" id="themeSwitch"></div></div>
  <div class="settings-item"><label><i class="fas fa-save"></i> Автозаполнение</label><div class="theme-switch" id="autoFillSwitch"></div></div>
  <div class="settings-item"><label><i class="fas fa-bug"></i> Сообщить о баге</label><button id="reportBugBtn">Сообщить</button></div>
  <div class="settings-item"><label><i class="fas fa-sign-out-alt"></i> Выход из аккаунта</label><button id="settingsLogoutBtn">Выйти</button></div>
  <div class="settings-item" id="panelBtnContainer"><label><i class="fas fa-tachometer-alt"></i> Панель управления</label><button id="panelBtn">Открыть</button></div>
</div>

<div class="bug-modal" id="bugModal">
  <div class="bug-content">
    <h3 style="color:#d4af37;"><i class="fas fa-bug"></i> Сообщить о баге</h3>
    <select id="bugType"><option>Графический баг</option><option>Ошибка отправки</option><option>Ошибка авторизации</option><option>Проблема с отображением</option><option>Другое</option></select>
    <textarea id="bugDescription" rows="3" placeholder="Опишите проблему..."></textarea>
    <button id="sendBugBtn" style="background:#d4af37;border:none;padding:10px;border-radius:20px;width:100%;cursor:pointer;">Отправить</button>
    <button id="closeBugBtn" style="background:none;border:1px solid #d4af37;padding:8px;border-radius:20px;width:100%;margin-top:8px;cursor:pointer;">Отмена</button>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <div class="modal-header"><h2 id="modalTitle"></h2><button class="modal-close" id="modalClose">&times;</button></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script src="js/main.js"></script>
</body>
</html>
