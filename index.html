<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>LSCSD — Sheriff Department</title>
  <link rel="icon" type="image/png" href="/lscsd/file.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* быстрые исправления + градиенты */
    .file-preview { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
    .file-preview-item { position: relative; width: 80px; height: 80px; border: 1px solid #d4af37; border-radius: 10px; overflow: hidden; cursor: pointer; background: linear-gradient(135deg, #0f121a, #0a0e14); }
    .file-preview-item img { width: 100%; height: 100%; object-fit: cover; }
    .remove-file { position: absolute; top: -8px; right: -8px; width: 20px; height: 20px; background: linear-gradient(135deg, #ff6b6b, #ff4444); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; color: white; }
    .role-buttons { display: flex; flex-wrap: wrap; gap: 8px; }
    .role-btn { background: linear-gradient(135deg, #0f121a, #0a0e14); border: 1px solid rgba(212,175,55,0.3); border-radius: 30px; padding: 6px 15px; cursor: pointer; transition: all 0.3s; color: #e8e8e8; }
    .role-btn.selected { background: linear-gradient(135deg, #d4af37, #b8962a); color: #0f121a; border-color: #fff; box-shadow: 0 0 15px rgba(212,175,55,0.5); }
    .role-btn:hover { transform: scale(1.02); background: linear-gradient(135deg, #b8962a, #9a7a20); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .notification { position: fixed; top: 20px; right: 20px; z-index: 9999; background: linear-gradient(135deg, #1a1f2a, #0f121a); border-left: 4px solid #d4af37; border-radius: 12px; padding: 12px 20px; min-width: 260px; color: #e8e8e8; box-shadow: 0 5px 25px rgba(0,0,0,0.3); }
    
    /* Градиенты для модальных окон */
    .modal-content {
      background: linear-gradient(145deg, #1a1f2a, #0a0e14, #0f121a) !important;
      border: 1px solid #d4af37 !important;
      position: relative;
      overflow: hidden;
    }
    .modal-content::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(212,175,55,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .modal-header {
      border-bottom: 1px solid rgba(212, 175, 55, 0.3) !important;
      background: transparent !important;
    }
    .modal-body {
      background: transparent !important;
    }
    .form-group input, .form-group select, .form-group textarea {
      background: linear-gradient(135deg, #0f121a, #0a0e14) !important;
      border: 1px solid rgba(212, 175, 55, 0.3) !important;
      color: #e8e8e8 !important;
      transition: all 0.3s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: #d4af37 !important;
      box-shadow: 0 0 15px rgba(212,175,55,0.2);
      outline: none !important;
    }
    .form-group label {
      color: #d4af37 !important;
      font-weight: 500;
    }
    input, select, textarea {
      background: linear-gradient(135deg, #0f121a, #0a0e14) !important;
      border-color: #d4af37 !important;
      color: #e8e8e8 !important;
    }
    .modal {
      background: rgba(0, 0, 0, 0.95) !important;
    }
    
    /* Градиент для карточек */
    .card {
      background: linear-gradient(145deg, rgba(20,25,35,0.8), rgba(15,18,26,0.9)) !important;
      backdrop-filter: blur(15px);
      transition: all 0.4s;
    }
    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 35px rgba(212,175,55,0.15);
      background: linear-gradient(145deg, rgba(30,35,45,0.9), rgba(20,25,35,0.95)) !important;
    }
    
    /* Градиент для кнопок */
    .auth-btn, .btn-submit {
      background: linear-gradient(135deg, #5865F2, #4752c4, #3a45a0) !important;
      transition: all 0.3s;
    }
    .auth-btn:hover, .btn-submit:hover {
      background: linear-gradient(135deg, #4752c4, #3a45a0, #2e3880) !important;
      transform: scale(1.02);
      box-shadow: 0 5px 25px rgba(88,101,242,0.4);
    }
    
    /* Градиент для вкладок */
    .tab-btn {
      background: linear-gradient(135deg, rgba(20,25,35,0.7), rgba(15,18,26,0.8));
      transition: all 0.3s;
    }
    .tab-btn.active {
      background: linear-gradient(135deg, #d4af37, #b8962a);
      color: #0f121a;
    }
  </style>
</head>
<body>

<div class="preloader" id="preloader">
  <div class="badge-container">
    <div class="siren-glow"><div class="siren-glow-light"></div><div class="siren-glow-light"></div></div>
    <div class="badge-star"></div><div class="badge-inner"></div>
    <div class="badge-text">LSCSD<br><span>SHERIFF DEPARTMENT</span></div>
    <div class="orbiting-particle particle1"></div><div class="orbiting-particle particle2"></div>
    <div class="orbiting-particle particle3"></div><div class="orbiting-particle particle4"></div>
  </div>
  <div class="preloader-logo">LSCSD</div>
  <div class="preloader-text">Верификация полномочий...</div>
  <div class="preloader-progress"><div class="preloader-progress-bar" id="preloaderProgress"></div></div>
</div>

<div class="app" id="app" style="display: none;">
  <nav class="navbar">
    <div class="nav-brand"><div class="nav-logo"></div><div><span class="nav-title-main">LSCSD</span><span class="nav-title-sub">LOS SANTOS COUNTY SHERIFF'S DEPARTMENT</span></div></div>
    <div class="nav-user" id="navUser" style="display: none;">
      <img id="navAvatar" class="nav-avatar"><span id="navName"></span>
      <i class="fas fa-cog" style="color:#d4af37;font-size:1rem; margin-left:8px; cursor:pointer;"></i>
    </div>
  </nav>

  <div class="auth-container" id="authContainer">
    <div class="auth-card">
      <div class="auth-icon"><i class="fab fa-discord"></i></div>
      <h1 class="auth-title">Добро пожаловать</h1>
      <p style="color:#9ca3af;margin-bottom:25px;">Авторизуйтесь через Discord</p>
      <button class="auth-btn" id="authBtn"><i class="fab fa-discord"></i> Войти через Discord</button>
    </div>
  </div>

  <div class="main-container" id="mainContainer" style="display: none;">
    <div class="dashboard-header">
      <h1 class="dashboard-title"><i class="fas fa-file-alt"></i> Электронные заявки</h1>
      <p style="color:#9ca3af;margin-top:8px;">Выберите тип обращения</p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="applications">📋 Заявки</button>
      <button class="tab-btn" data-tab="history">📜 История</button>
      <button class="tab-btn" data-tab="stats">📊 Статистика</button>
    </div>

    <div id="applications-tab" class="tab-content active"><div class="cards-grid" id="cardsGrid"></div></div>
    <div id="history-tab" class="tab-content">
      <div class="search-box"><input type="text" id="historySearch" placeholder="🔍 Поиск по заявкам..."></div>
      <div class="history-list" id="historyList"></div>
    </div>
    <div id="stats-tab" class="tab-content">
      <div class="stats-grid" id="statsGrid"></div>
      <canvas id="statsChart" width="400" height="200"></canvas>
    </div>
  </div>
</div>

<div class="settings-panel" id="settingsPanel">
  <button class="close-settings" id="closeSettings">&times;</button>
  <h3><i class="fas fa-sliders-h"></i> Настройки</h3>
  <div class="settings-item"><label><i class="fas fa-moon"></i> Тёмная / <i class="fas fa-sun"></i> Светлая тема</label><div class="theme-switch" id="themeSwitch"></div></div>
  <div class="settings-item"><label><i class="fas fa-save"></i> Автозаполнение</label><div class="theme-switch" id="autoFillSwitch"></div></div>
  <div class="settings-item"><label><i class="fas fa-bug"></i> Сообщить о баге</label><button id="reportBugBtn">Сообщить</button></div>
  <div class="settings-item"><label><i class="fas fa-sign-out-alt"></i> Выход из аккаунта</label><button id="settingsLogoutBtn">Выйти</button></div>
  <div class="settings-item" id="panelBtnContainer" style="display:none;"><label><i class="fas fa-tachometer-alt"></i> Панель управления</label><button id="panelBtn">Открыть</button></div>
</div>

<div class="bug-modal" id="bugModal">
  <div class="bug-content">
    <h3 style="color:#d4af37;"><i class="fas fa-bug"></i> Сообщить о баге</h3>
    <select id="bugType"><option>Графический баг</option><option>Ошибка отправки</option><option>Ошибка авторизации</option><option>Проблема с отображением</option><option>Другое</option></select>
    <textarea id="bugDescription" rows="3" placeholder="Опишите проблему..."></textarea>
    <button id="sendBugBtn" style="background:#d4af37;border:none;padding:10px;border-radius:20px;width:100%;cursor:pointer;">Отправить</button>
    <button id="closeBugBtn" style="background:none;border:1px solid #d4af37;padding:8px;border-radius:20px;width:100%;margin-top:8px;cursor:pointer;">Отмена</button>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <div class="modal-header"><h2 id="modalTitle"></h2><button class="modal-close" id="modalClose">&times;</button></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script src="js/main.js"></script>
</body>
</html>
